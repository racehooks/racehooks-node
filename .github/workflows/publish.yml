name: Release

# Fully automated release on every push to main. semantic-release reads the
# conventional-commit messages since the last release, decides the version bump
# (fix: -> patch, feat: -> minor, feat!:/BREAKING CHANGE -> major), publishes the
# npm package, then commits the bump back and creates the GitHub release + tag.
# Commits with no releasable changes (docs:, chore:, ci:, ...) publish nothing.
#
# Publishing authenticates via npm Trusted Publishing (OIDC) — no NPM_TOKEN. The
# trust relationship is configured on npmjs.com for this repo + publish.yml, and
# npm generates provenance automatically. Requires id-token: write and npm >= 11.5.1.

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # semantic-release: commit version bump + create tag/release
      issues: write # semantic-release/github: comment on released issues
      pull-requests: write # semantic-release/github: comment on released PRs
      id-token: write # npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # semantic-release v25 + trusted publishing require Node >= 22.14
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest # trusted publishing requires npm >= 11.5.1
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
